name: Harness daily

on:
  workflow_dispatch:
  schedule:
    # 02:17 UTC + per-run jitter inside the job.
    - cron: "17 2 * * *"

concurrency:
  group: harness-daily
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # reserved for future OIDC → AWS / cloud broker

jobs:
  run:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: harness-prod
    defaults:
      run:
        working-directory: harness
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false

      - name: Run harness
        env:
          HARNESS_AGE_IDENTITY:  ${{ secrets.HARNESS_AGE_IDENTITY }}
          HARNESS_SIGN_SECRET:   ${{ secrets.HARNESS_SIGN_SECRET }}
          HARNESS_R2_ACCESS_KEY: ${{ secrets.HARNESS_R2_ACCESS_KEY }}
          HARNESS_R2_SECRET_KEY: ${{ secrets.HARNESS_R2_SECRET_KEY }}
          HARNESS_R2_ENDPOINT:   ${{ secrets.HARNESS_R2_ENDPOINT }}
          HARNESS_R2_BUCKET:     ${{ secrets.HARNESS_R2_BUCKET }}
          RUST_LOG: harness=info
        run: |
          set +x
          nix run .#harness -- run
