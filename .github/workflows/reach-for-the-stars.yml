name: Reach for the stars

on:
  workflow_dispatch:
    inputs:
      sync-mode:
        description: "Sync mode: auto, incremental, or full"
        required: false
        default: auto
        type: choice
        options: [auto, incremental, full]
  schedule:
    # Six times a day at :17 to dodge the top-of-the-hour scheduler stampede.
    - cron: "17 */4 * * *"

permissions:
  contents: write

# Never run two exports in parallel: they would race on the same file.
concurrency:
  group: reach-stars-export
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  export:
    # Don't run on forks: they don't have the right repo owner anyway.
    if: github.repository == 'PhysShell/reach-for-the-stars'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: reach-stars-release

      - name: ensure lockfile
        run: test -f Cargo.lock || cargo generate-lockfile

      - name: build reach-stars (release)
        run: cargo build --release --locked

      - name: export stars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          RUST_LOG: info
          SYNC_MODE: ${{ github.event.inputs['sync-mode'] || 'auto' }}
        run: |
          ./target/release/reach-stars export \
            --output assets/data/stars.json \
            --sync-mode "$SYNC_MODE"

      - name: commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/data/stars.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: update stars"
            git push
          fi
